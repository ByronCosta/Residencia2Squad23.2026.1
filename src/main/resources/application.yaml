spring:
  application:
    name: demo

  server: # Movido para fora de datasource
    port: 8080

  datasource:
    url: jdbc:postgresql://localhost:5432/reservasacenture
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security: # Movido para a mesma coluna de jpa e datasource
    saml2:
      relyingparty:
        registration:
          azure:
            assertingparty:
              metadata-uri: "classpath:azure-metadata.xml"

# Configurações fora do bloco spring
application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG